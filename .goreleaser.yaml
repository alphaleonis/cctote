version: 2

before:
  hooks:
    - go-licenses save ./... --save_path=./dist/third_party_licenses --force --ignore github.com/alphaleonis/cctote

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/alphaleonis/cctote/internal/buildinfo.version={{ .Tag }}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - src: ./dist/third_party_licenses/**/*
        dst: third_party_licenses
        strip_parent: true

release:
  draft: true

changelog:
  disable: true
